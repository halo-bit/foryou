<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<title>Happy Birthday 🎂</title>

<style>
body{
    margin:0;
    font-family:Arial;
    text-align:center;
    background:linear-gradient(135deg,#ff758c,#ff7eb3);
    color:white;
    overflow-x:hidden;
}

/* Judul */
h1{
    margin-top:60px;
    font-size:55px;
}

/* Pesan */
.message{
    width:70%;
    margin:auto;
    font-size:22px;
}

/* Kue */
.cake{
    font-size:120px;
    margin-top:30px;
    cursor:pointer;
}

/* Tombol */
button{
    padding:12px 25px;
    font-size:18px;
    border:none;
    border-radius:10px;
    background:white;
    color:#ff4d79;
    cursor:pointer;
    margin-top:25px;
}

/* Galeri */
.gallery img{
    width:200px;
    border-radius:15px;
    margin:10px;
    transition:0.3s;
}

.gallery img:hover{
    transform:scale(1.1);
}

/* Confetti */
.confetti{
    position:absolute;
    width:8px;
    height:8px;
    background:white;
    animation:fall linear infinite;
}

@keyframes fall{
    from{transform:translateY(-100vh);}
    to{transform:translateY(100vh);}
}

</style>

</head>

<body>

<h1>🎉 Selamat Ulang Tahun! 🎂</h1>

<p class="message">
Semoga di hari spesial ini kamu selalu diberikan kesehatan,
kebahagiaan, dan semua impianmu bisa tercapai.  
Terima kasih sudah menjadi orang yang luar biasa. ✨
</p>

<div class="cake" onclick="blowCandle()">
🎂
</div>

<p>Klik kuenya untuk meniup lilin 🎂</p>

<button onclick="showMessage()">Buka Pesan Spesial 💌</button>

<br><br>

<div class="gallery">
<h2>Kenangan Kita 📸</h2>
<img src="foto1.jpg">
<img src="foto2.jpg">
</div>

<audio autoplay loop>
<source src="musik.mp3" type="audio/mpeg">
</audio>

<script>

/* pesan spesial */
function showMessage(){
alert("🎉 Selamat ulang tahun! Semoga semua harapanmu terkabul 🎂");
}

/* animasi confetti */
for(let i=0;i<100;i++){
let confetti=document.createElement("div");
confetti.className="confetti";
confetti.style.left=Math.random()*100+"vw";
confetti.style.animationDuration=(3+Math.random()*5)+"s";
document.body.appendChild(confetti);
}

/* tiup lilin */
function blowCandle(){
alert("✨ Make a wish! Semoga semua harapanmu tercapai ✨");
}

</script>

</body>
</html>
