<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<title>Happy Birthday 🎂</title>

<style>

body{
    margin:0;
    font-family:Arial;
    text-align:center;
    background:linear-gradient(135deg,#ff758c,#ff7eb3);
    color:white;
    overflow-x:hidden;
}

/* Judul */
h1{
    margin-top:60px;
    font-size:55px;
}

/* Pesan */
.message{
    width:70%;
    margin:auto;
    font-size:22px;
    line-height:1.6;
}

/* Kue */
.cake{
    font-size:120px;
    margin-top:30px;
    cursor:pointer;
    transition:0.3s;
}

.cake:hover{
    transform:scale(1.1);
}

/* Tombol */
button{
    padding:12px 25px;
    font-size:18px;
    border:none;
    border-radius:10px;
    background:white;
    color:#ff4d79;
    cursor:pointer;
    margin-top:25px;
}

button:hover{
    transform:scale(1.1);
}

/* Galeri */
.gallery img{
    width:200px;
    border-radius:15px;
    margin:10px;
    transition:0.3s;
}

.gallery img:hover{
    transform:scale(1.1);
}

/* Confetti */
.confetti{
    position:absolute;
    width:8px;
    height:8px;
    background:white;
    animation:fall linear infinite;
}

@keyframes fall{
    from{transform:translateY(-100vh);}
    to{transform:translateY(100vh);}
}

</style>

</head>

<body>

<h1>🎉 Selamat Ulang Tahun! 🎂</h1>

<p class="message">
Semoga di hari spesial ini kamu selalu diberikan kesehatan,
kebahagiaan, dan semua impianmu bisa tercapai.  
Terima kasih sudah menjadi orang yang luar biasa dalam hidupku. ✨
</p>

<div class="cake" onclick="blowCandle()">
🎂
</div>

<p>Buka pesan lalu tiup lilinnya 🎂</p>

<button onclick="showMessage()">Buka Pesan Spesial 💌</button>

<br><br>

<div class="gallery">
<h2>Kenangan Kita 📸</h2>

<img src="foto1.jpg">
<img src="foto2.jpg">

</div>

<button onclick="playMusic()">Play Music 🎵</button>

<audio id="bgmusic" loop>
<source src="music1.mp3" type="audio/mp3">
</audio>

<script>

/* musik */
function playMusic(){
let music=document.getElementById("bgmusic");
music.play();
}

/* pesan spesial */
function showMessage(){
alert(`🎉 Selamat Ulang Tahun, Bu Bos yang Paling Berisik!
Selamat ulang tahun, Sayang. Hari ini adalah hari di mana dunia harus berterima kasih karena telah menghadirkan satu manusia paling unik, paling ajaib, dan paling menggemaskan sepertimu. Saat aku menulis ini, aku sambil tersenyum membayangkan wajahmu yang mungkin sedang cemberut, atau mungkin sedang asyik mengunyah jajanan favoritmu tanpa peduli dunia sekitar.

Aku ingin jujur padamu. Menghadapi kamu itu terkadang rasanya seperti naik roller coaster tanpa sabuk pengaman. Sifat kekanak-kanakanmu itu sering kali membuatku geleng-geleng kepala. Kamu bisa merajuk hanya karena hal sepele, atau tiba-tiba manja minta perhatian di saat yang paling tidak terduga. Ditambah lagi dengan mood-mu yang bisa berubah lebih cepat daripada pergantian musim; detik ini kamu tertawa bahagia, detik berikutnya kamu bisa diam seribu bahasa hanya karena aku telat membalas pesanmu sepuluh menit. Tapi, tahukah kamu? Justru ketidakpastian itulah yang membuat hari-hariku tidak pernah membosankan. Aku belajar untuk menjadi lebih sabar, lebih peka, dan lebih kuat untuk menjadi sandaranmu.

Lalu, ada sisi cerewetmu. Kadang aku berpikir, dari mana datangnya semua energi itu? Kamu bisa menceritakan hal yang sama berulang kali, mengomentari apa saja yang kita lihat di jalan, atau sekadar memprotes hal-hal kecil dengan nada bicaramu yang khas. Tapi sejujurnya, saat suasana hening, aku justru merindukan suaramu. Rumah dan hatiku terasa sepi tanpa celotehanmu yang memenuhi udara. Jangan pernah berhenti bicara ya, karena... lanjutannya ada di kue..

.`);
}

/* animasi confetti */
for(let i=0;i<120;i++){
let confetti=document.createElement("div");
confetti.className="confetti";
confetti.style.left=Math.random()*100+"vw";
confetti.style.animationDuration=(3+Math.random()*5)+"s";
document.body.appendChild(confetti);
}

/* tiup lilin */
function blowCandle(){
alert("✨ ...karena setiap kata yang keluar dari mulutmu adalah musik yang paling aku sukai. ✨");
}

</script>

</body>
</html>
